<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CareerAI — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .auth-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }
    .auth-logo {
      display:flex; align-items:center; gap:10px;
      margin-bottom: 32px;
    }
    .auth-logo svg { width:36px; height:36px; }
    .auth-logo span { font-size:1.4rem; font-weight:900; color:var(--accent); }
    .auth-tabs {
      display:flex; background:rgba(0,0,0,0.3);
      border-radius:12px; padding:4px; margin-bottom:28px;
    }
    .auth-tab {
      flex:1; padding:10px; border:none; background:none;
      color:var(--text-secondary); font-size:0.9rem; font-weight:600;
      border-radius:10px; cursor:pointer; transition:var(--transition);
    }
    .auth-tab.active {
      background: var(--accent); color: var(--bg-base); 
    }
    .form-group { margin-bottom:16px; }
    .form-label { display:block; font-size:0.8rem; font-weight:600; color:var(--text-secondary); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.06em; }
    .form-input {
      width:100%; padding:12px 16px; background:rgba(0,0,0,0.3);
      border:1px solid var(--border); border-radius:12px;
      color:var(--text-primary); font-size:0.95rem; font-family:inherit;
      transition:var(--transition); box-sizing:border-box;
    }
    .form-input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(255,239,179,0.1); }
    .form-input::placeholder { color:var(--text-muted); }
    .btn-auth {
      width:100%; padding:14px; margin-top:8px;
      background:var(--accent); color:var(--bg-base);
      border:none; border-radius:12px; font-size:1rem;
      font-weight:700; cursor:pointer; transition:var(--transition);
      font-family:inherit;
    }
    .btn-auth:hover { filter:brightness(1.1); transform:translateY(-1px); }
    .btn-auth:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
    .auth-error {
      background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3);
      color:#fca5a5; border-radius:10px; padding:12px 16px;
      font-size:0.85rem; margin-bottom:16px; display:none;
    }
    .auth-divider {
      text-align:center; color:var(--text-muted);
      font-size:0.8rem; margin:20px 0;
    }
  </style>
</head>
<body>
  <canvas id="particles-canvas" style="position:fixed;top:0;left:0;z-index:0;pointer-events:none;"></canvas>
  <div class="auth-card" style="position:relative;z-index:1;">
    <div class="auth-logo">
      <svg viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="18" r="17" fill="#013e37" stroke="#ffefb3" stroke-width="1.5"/>
        <path d="M10 24l5-8 4 5 3-4 4 7" stroke="#ffefb3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="26" cy="11" r="2.5" fill="#ffefb3"/>
      </svg>
      <span>CareerAI</span>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Login</button>
      <button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">Register</button>
    </div>

    <div id="auth-error" class="auth-error"></div>

    <!-- LOGIN FORM -->
    <form id="form-login" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input id="login-email" type="email" class="form-input" placeholder="your@email.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input id="login-password" type="password" class="form-input" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn-auth" id="btn-login">Login →</button>
    </form>

    <!-- REGISTER FORM -->
    <form id="form-register" onsubmit="handleRegister(event)" style="display:none;">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input id="reg-email" type="email" class="form-input" placeholder="your@email.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input id="reg-password" type="password" class="form-input" placeholder="Min. 6 characters" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input id="reg-confirm" type="password" class="form-input" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn-auth" id="btn-register">Create Account →</button>
    </form>
  </div>

  <script src="/app.js"></script>
  <script src="/auth.js"></script>
</body>
</html>
